name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: |
          bash -n install.sh
          bash -n update.sh
          bash -n install-macos.sh
          bash -n update-macos.sh
      - name: Run ShellCheck
        run: shellcheck -S style install.sh update.sh install-macos.sh update-macos.sh
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $all = @()
          foreach ($f in @('./install-windows.ps1', './update-windows.ps1')) {
            $all += Invoke-ScriptAnalyzer -Path $f -Severity Warning,Error
          }
          if ($all.Count -gt 0) { $all | Format-Table -AutoSize; exit 1 }
